<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#111827;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:350px;
            text-align:center;
            box-shadow:0 0 20px #22d3ee;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:95%;
            padding:10px;
            background:#22d3ee;
            border:none;
            border-radius:8px;
            font-weight:bold;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        p{
            color:#22c55e;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Register</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p>{{ msg }}</p>

    <a href="/login">Already have account? Login</a>
</div>

</body>
</html>
